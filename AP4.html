                    <h2> Ano ang mga Yugto ng Pamumuhay at Konsepto ng Pambansang Kaunlaran? </h2>
                    <p> Yugto ng pamumuhay ng tao: <br>
Pangangaso at pangingisda <br>
Pagpapastol <br>
Pagtatanim <br>
Handicraft <br>
Panahong Industriyal <br> 

<b>MGA KONSEPTO NG PAMBANSANG PANGKAUNLARAN</b> <br>
Pagbabago <br>
-Paraan upang maging iba o naiiba.<br>

Pag-unlad (Positive change and development-nararamdaman) <br>
-Pagbabago mula sa mababa tungo sa mataas na antas ng pamumuhay.<br>
-Pag angat, pagsulong, o paglago ng pangkalahatang aspeto ng buhay. (Bon at Bon) <br>
-Isang progresibo at aktibong proseso at ang produkto nito ay ang pagsulong (Fajardo) <br>
-Ang kaunlaran ay matatamo lamang kung mapauunlad ang yaman ng buhay kaysa sa yaman ng ekonomiya. (Amartya Sen) <br>
-Ayon pa rin kay Fajardo ang pagsulong ay nakikita at nasusukat.<br>
-Ang kaunlaran ay matatamo kung bibigyang pansin ang pagtanggal sa mga ugat ng kawalang kalayaan tulad ng kahirapan, diskriminasyon, at iba pa.<br>

Pagsulong (nakikita) <br>
-Pagusad tungo sa layunin. <br>
-Pagpapaunlad ng kakayahan, kaalaman, at abilidad upang makasabay sa agos ng buhay.<br>
-Sa pana-panahon, naiiba ang sitwasyon at kalagayan kaya naman ang pagsulong ay kailangan upang makasabay sa agos ng buhay.<br>
-Ayon sa United Nations Conference on Trade and Development (2012) ay mas malaki ang bilang ng dayuhang mamumuhunan sa papaunlad na bansa kaysa sa maunlad na bansa.<br>

Ebolusyon (Kailangan ng mahabang proseso)<br>
-Pagbabago sa mga katangian sa loob ng mahabang panahon<br>
-Anuman ang unang dumating ay mas mabuti sa sinundang panahon.<br>
 </p>

                    <h2> Ano ang dalawang magkaibang konsepto ng pag-unlad at salik ng pag-unlad? </h2>
                    <p> <b> SALIK SA PAGSULONG NG EKONOMIYA </b> <br>
Likas na yaman <br>
Yamang tao <br>
Kapital <br>
Teknolohiya at Inobasyon <br>

HDI (HUMAN DEVELOPMENT INDEX) <br>
-Pangkalahatang sukat ng kakayahan ng bansa na matugunan ang mahahalagang aspekto ng kaunlarang pantao: kalusugan, edukasyon, etc. <br>

MAHBUB UL HAQ (Father of HDI) <br>
-Akses sa edukasyon <br>
-Maayos na serbisyong pangkalusugan<br>
-Mas matatag na kabuhayan <br>
-Kawalan ng karahasan at krimen <br>
-Kasiya-siyang mga libangan <br>
-Kalayaang pampulitika at pangkultura <br>
-Pakikilahok sa mga gawaing panlipunan <br>


<b> MGA PALATANDAAN NG PAG-UNLAD: </b> <br>
Makatwiran at dinamikong kaayusan ng panlipunan <br>
Kasaganaan at kasarinlan <br>
Kalayaan sa kahirapan, hanapbuhay para sa lahat, umaangat na istandard ng pamumuhay, at mainam na uri ng buhay para sa lahat <br>
Sapat na mga lingkurang panlipunan <br>
Katarungang panlipunan <br>
